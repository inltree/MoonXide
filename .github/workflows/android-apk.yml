name: android-apk-build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: release
        type: choice
        options:
          - debug
          - release
      publish_release:
        description: Publish to GitHub Releases
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Generate Android platform
        run: flutter create . --platforms=android --project-name moonxide

      - name: Install dependencies
        run: |
          rm -f pubspec.lock
          flutter pub get

      - name: Force Android SDK versions
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          roots = [Path('android'), Path.home() / '.pub-cache' / 'hosted']
          patterns = [
              (re.compile(r'compileSdk\s*=\s*flutter\.compileSdkVersion'), 'compileSdk = 36'),
              (re.compile(r'compileSdkVersion\s+flutter\.compileSdkVersion'), 'compileSdkVersion 36'),
              (re.compile(r'compileSdk\s+flutter\.compileSdkVersion'), 'compileSdk 36'),
              (re.compile(r'compileSdk\s*=\s*34'), 'compileSdk = 36'),
              (re.compile(r'compileSdkVersion\s+34'), 'compileSdkVersion 36'),
              (re.compile(r'compileSdk\s+34'), 'compileSdk 36'),
              (re.compile(r'targetSdk\s*=\s*flutter\.targetSdkVersion'), 'targetSdk = 36'),
              (re.compile(r'targetSdkVersion\s+flutter\.targetSdkVersion'), 'targetSdkVersion 36'),
              (re.compile(r'targetSdk\s+flutter\.targetSdkVersion'), 'targetSdk 36'),
          ]

          patched = []
          for root in roots:
              if not root.exists():
                  continue
              for p in list(root.rglob('*.gradle')) + list(root.rglob('*.gradle.kts')):
                  s = p.read_text(errors='ignore')
                  original = s
                  for rx, repl in patterns:
                      s = rx.sub(repl, s)
                  if s != original:
                      p.write_text(s)
                      patched.append(str(p))

          if not patched:
              raise SystemExit('No Android Gradle files were patched')
          print('patched Gradle files:')
          for item in patched:
              print(' -', item)
          PY

      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug --no-tree-shake-icons
          else
            flutter build apk --release --no-tree-shake-icons
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonxide-${{ github.event.inputs.build_type }}-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create Release
        if: ${{ github.event.inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: moonxide-${{ github.run_number }}
          name: MoonXide ${{ github.run_number }}
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
