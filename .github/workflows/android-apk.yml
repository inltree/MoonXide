name: android-apk-build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: release
        type: choice
        options:
          - debug
          - release
      publish_release:
        description: Publish to GitHub Releases
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Generate Android platform
        run: flutter create . --platforms=android --project-name moonxide

      - name: Install dependencies
        run: |
          rm -f pubspec.lock
          flutter pub get

      - name: Force Android SDK versions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          candidates = [Path('android/app/build.gradle'), Path('android/app/build.gradle.kts')]
          patched = False
          for p in candidates:
              if not p.exists():
                  continue
              s = p.read_text()
              original = s
              s = s.replace('compileSdk = flutter.compileSdkVersion', 'compileSdk = 36')
              s = s.replace('compileSdk flutter.compileSdkVersion', 'compileSdk 36')
              s = s.replace('targetSdk = flutter.targetSdkVersion', 'targetSdk = 36')
              s = s.replace('targetSdk flutter.targetSdkVersion', 'targetSdk 36')
              if s != original:
                  p.write_text(s)
                  patched = True
                  print(f'patched {p}')
                  print(s)
          if not patched:
              raise SystemExit('No Android app Gradle file was found or patched')
          PY

      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug --no-tree-shake-icons
          else
            flutter build apk --release --no-tree-shake-icons
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonxide-${{ github.event.inputs.build_type }}-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create Release
        if: ${{ github.event.inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: moonxide-${{ github.run_number }}
          name: MoonXide ${{ github.run_number }}
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
