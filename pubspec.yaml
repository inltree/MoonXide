name: moonxide

description: MoonXide is a mobile GitHub-powered IDE for Android, Kotlin, Java, and Flutter development.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  http: ^1.2.2
  dio: ^5.7.0
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  encrypt: ^5.0.3
  crypto: ^3.0.5
  archive: ^3.6.1
  intl: ^0.19.0
  uuid: ^4.5.1
  collection: ^1.18.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  flutter_markdown: ^0.7.3+1
  webview_flutter: ^4.10.0
  flutter_slidable: ^3.1.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
